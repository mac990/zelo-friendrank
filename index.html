<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好友排行榜</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", Arial, sans-serif;
    background: linear-gradient(135deg, #0f1428 0%, #1b2244 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 24px;
    margin-bottom: 4px;
  }

  .header p {
    color: #9aa3c4;
    font-size: 13px;
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: #9aa3c4;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 4px solid #2a3358;
    border-top-color: #ffe05f;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .invite-card {
    background: linear-gradient(135deg, #ffe05f 0%, #ffb84d 100%);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    color: #10172f;
    text-align: center;
    box-shadow: 0 8px 20px rgba(255, 224, 95, 0.25);
  }

  .invite-card .title {
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .invite-card .desc {
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .invite-btn {
    background: #10172f;
    color: #ffe05f;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }

  .invite-btn:active {
    transform: scale(0.97);
  }

  .reward-card {
    background: #1b2244;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .reward-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .reward-header .label {
    font-size: 13px;
    color: #9aa3c4;
  }

  .reward-header .tier-name {
    font-size: 14px;
    font-weight: 800;
    color: #ffe05f;
  }

  .tier-track {
    display: flex;
    justify-content: space-between;
    position: relative;
    margin: 20px 8px 8px 8px;
  }

  .tier-track::before {
    content: "";
    position: absolute;
    top: 14px;
    left: 0;
    right: 0;
    height: 4px;
    background: #2a3358;
    border-radius: 4px;
    z-index: 0;
  }

  .tier-track .progress-fill {
    position: absolute;
    top: 14px;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, #ffe05f, #ffb84d);
    border-radius: 4px;
    z-index: 1;
    transition: width 0.4s;
  }

  .tier-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
    position: relative;
  }

  .tier-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #2a3358;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border: 3px solid #1b2244;
  }

  .tier-circle.unlocked {
    background: linear-gradient(135deg, #ffe05f, #ffb84d);
  }

  .tier-label {
    font-size: 10px;
    color: #9aa3c4;
    margin-top: 4px;
  }

  .stat-bar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    background: #1b2244;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #9aa3c4;
  }

  .stat-bar b {
    color: #ffe05f;
    font-size: 16px;
  }

  .list-title {
    font-size: 14px;
    color: #9aa3c4;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .rank-item {
    display: flex;
    align-items: center;
    background: #1b2244;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .rank-item.me {
    background: linear-gradient(135deg, #2a3358 0%, #1b2244 100%);
    border: 2px solid #ffe05f;
  }

  .rank-badge {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    margin-right: 12px;
    flex-shrink: 0;
  }

  .rank-badge.gold {
    background: linear-gradient(135deg, #ffe05f, #ffb84d);
    color: #10172f;
    font-size: 20px;
  }

  .rank-badge.silver {
    background: linear-gradient(135deg, #d4d9e8, #a4acc9);
    color: #10172f;
    font-size: 20px;
  }

  .rank-badge.bronze {
    background: linear-gradient(135deg, #e8a25f, #c17b3a);
    color: #fff;
    font-size: 20px;
  }

  .rank-badge.normal {
    background: #2a3358;
    color: #9aa3c4;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    object-fit: cover;
    margin-right: 10px;
    background: #2a3358;
    flex-shrink: 0;
    display: none;
  }

  .avatar.show {
    display: block;
  }

  .player-info {
    flex: 1;
    min-width: 0;
  }

  .player-name {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .me-tag {
    background: #ffe05f;
    color: #10172f;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .player-score {
    font-size: 12px;
    color: #9aa3c4;
    margin-top: 2px;
  }

  .rank-tag {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .rank-tag.S {
    background: #ffe05f;
    color: #10172f;
  }

  .rank-tag.A {
    background: #06c755;
    color: #fff;
  }

  .rank-tag.B {
    background: #3a4372;
    color: #fff;
  }

  .rank-tag.none {
    background: #2a3358;
    color: #666;
  }

  .score-value {
    font-size: 20px;
    font-weight: 800;
    color: #ffe05f;
    margin-left: 8px;
    min-width: 50px;
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #9aa3c4;
    line-height: 1.6;
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #06c755;
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
  }

  .debug {
    margin-top: 12px;
    font-size: 11px;
    color: #5d6688;
    text-align: center;
    word-break: break-all;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🌀 好友排行榜</h1>
    <p>看看誰是朋友圈裡最強的陀螺高手</p>
  </div>

  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <div id="loading-text">正在載入你的資料...</div>
  </div>

  <div id="main-content" style="display:none;">
    <div class="invite-card">
      <div class="title">🎯 邀請好友一起玩</div>
      <div class="desc">分享你的專屬連結，好友的成績會自動出現在排行榜上</div>
      <button class="invite-btn" onclick="shareInviteLink()">📱 分享給 LINE 好友</button>
    </div>

    <div class="reward-card">
      <div class="reward-header">
        <span class="label">邀請獎勵進度</span>
        <span class="tier-name" id="tier-name">尚未解鎖</span>
      </div>

      <div class="tier-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>

        <div class="tier-node">
          <div class="tier-circle" id="node-1">🥉</div>
          <div class="tier-label">1人</div>
        </div>

        <div class="tier-node">
          <div class="tier-circle" id="node-3">🥈</div>
          <div class="tier-label">3人</div>
        </div>

        <div class="tier-node">
          <div class="tier-circle" id="node-5">🥇</div>
          <div class="tier-label">5人</div>
        </div>
      </div>
    </div>

    <div class="stat-bar">
      <span>朋友圈人數 <b id="friend-count">0</b> 人</span>
      <span id="my-rank-text">我的排名 <b>-</b></span>
    </div>

    <div class="list-title">排行榜</div>
    <div id="rank-list"></div>
    <div class="debug" id="debug-text"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // 設定區
  // ============================================================

  var GAS_URL = "https://script.google.com/macros/s/AKfycbzXS64QzQ9eoWUVuYynIYIJ-lXfIJYw7ge8ICSnGRNCXbKax45ihne4mBN23SgqqOwGmg/exec";

  // 排行榜頁面自己的 LIFF ID
  var LIFF_ID = "2007022255-lfPkJn2u";

  // 主遊戲正式網址
  var GAME_URL = "https://zelosportivo.com/zh/pages/%E6%88%B0%E9%AC%A5%E9%99%80%E8%9E%BA%E9%81%8A%E6%88%B2";

  var myUserId = "";
  var myPlayerName = "";
  var myPictureUrl = "";

  // ============================================================
  // 工具
  // ============================================================

  function setLoadingText(text) {
    var el = document.getElementById("loading-text");
    if (el) el.textContent = text;
  }

  function setDebug(text) {
    var el = document.getElementById("debug-text");
    if (el) el.textContent = text || "";
  }

  function showToast(msg) {
    var toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");

    setTimeout(function() {
      toast.classList.remove("show");
    }, 2500);
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function buildQuery(params) {
    var pairs = [];

    Object.keys(params || {}).forEach(function(key) {
      if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
        pairs.push(encodeURIComponent(key) + "=" + encodeURIComponent(params[key]));
      }
    });

    return pairs.join("&");
  }

  function jsonp(action, params) {
    params = params || {};

    return new Promise(function(resolve, reject) {
      var callbackName = "zelo_jsonp_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
      var script = document.createElement("script");
      var timeout;

      params.action = action;
      params.callback = callbackName;

      window[callbackName] = function(data) {
        clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (err) {
          window[callbackName] = null;
        }

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        resolve(data);
      };

      script.onerror = function() {
        clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (err) {
          window[callbackName] = null;
        }

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        reject(new Error("JSONP request failed: " + action));
      };

      timeout = setTimeout(function() {
        try {
          delete window[callbackName];
        } catch (err) {
          window[callbackName] = null;
        }

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        reject(new Error("JSONP timeout: " + action));
      }, 15000);

      script.src = GAS_URL + "?" + buildQuery(params);
      document.body.appendChild(script);
    });
  }

  function getProfileParams() {
    return {
      userId: myUserId,
      displayName: myPlayerName,
      playerName: myPlayerName,
      name: myPlayerName,
      pictureUrl: myPictureUrl
    };
  }

  function getBadgeClass(position) {
    position = Number(position || 0);

    if (position === 1) return "gold";
    if (position === 2) return "silver";
    if (position === 3) return "bronze";

    return "normal";
  }

  function getBadgeIcon(position) {
    position = Number(position || 0);

    if (position === 1) return "🥇";
    if (position === 2) return "🥈";
    if (position === 3) return "🥉";

    return position || "-";
  }

  function buildInviteLink() {
    // 同時支援舊主遊戲格式 inviter，以及新版後端格式 inviterId / inviterName / inviterPictureUrl
    var params = {
      inviter: myUserId,
      inviterId: myUserId,
      inviterName: myPlayerName,
      inviterPictureUrl: myPictureUrl
    };

    return GAME_URL + "?" + buildQuery(params);
  }

  function saveLocalProfile() {
    try {
      var profile = {
        id: myUserId,
        userId: myUserId,
        name: myPlayerName || "你",
        displayName: myPlayerName || "你",
        playerName: myPlayerName || "你",
        pictureUrl: myPictureUrl || "",
        isMe: true
      };

      localStorage.setItem("zg_profile", JSON.stringify(profile));
      localStorage.setItem("zelo_liff_profile", JSON.stringify({
        userId: myUserId,
        displayName: myPlayerName || "你",
        playerName: myPlayerName || "你",
        pictureUrl: myPictureUrl || ""
      }));
    } catch (err) {}
  }

  // ============================================================
  // 分享
  // ============================================================

  function shareInviteLink() {
    var link = buildInviteLink();

    var shareText =
      "🎮 一起來玩親子陀螺小小挑戰賽！\n\n"
      + "用我的連結加入，看看誰的分數更高：\n"
      + link;

    if (
      typeof liff !== "undefined" &&
      liff.isApiAvailable &&
      liff.isApiAvailable("shareTargetPicker")
    ) {
      liff.shareTargetPicker([
        {
          type: "text",
          text: shareText
        }
      ]).then(function() {
        showToast("✅ 已開啟 LINE 分享");
      }).catch(function(err) {
        console.error("分享失敗", err);
        copyInviteLink(link);
      });

      return;
    }

    copyInviteLink(link);
  }

  function copyInviteLink(link) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(function() {
        showToast("✅ 邀請連結已複製！");
      }).catch(function() {
        fallbackCopy(link);
      });

      return;
    }

    fallbackCopy(link);
  }

  function fallbackCopy(text) {
    try {
      var input = document.createElement("textarea");
      input.value = text;
      input.style.position = "fixed";
      input.style.left = "-9999px";
      document.body.appendChild(input);
      input.focus();
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
      showToast("✅ 邀請連結已複製！");
    } catch (err) {
      showToast("請手動複製連結");
      window.prompt("請複製邀請連結", text);
    }
  }

  // ============================================================
  // 畫面渲染
  // ============================================================

  function renderLeaderboard(data) {
    data = data || {};
    data.friends = data.friends || [];

    document.getElementById("friend-count").textContent = data.totalFriends || 0;

    var myEntry = null;

    for (var i = 0; i < data.friends.length; i++) {
      if (data.friends[i].isMe) {
        myEntry = data.friends[i];
        break;
      }
    }

    document.getElementById("my-rank-text").innerHTML =
      "我的排名 <b>#" + (myEntry ? myEntry.position : "-") + "</b>";

    var listEl = document.getElementById("rank-list");

    if (!data.friends || data.friends.length === 0) {
      listEl.innerHTML =
        '<div class="empty-state"><div class="icon">👥</div>還沒有好友資料<br>快邀請朋友一起玩吧！</div>';
      return;
    }

    listEl.innerHTML = "";

    data.friends.forEach(function(f) {
      var bestRank = String(f.bestRank || "");
      var rankClass = ["S", "A", "B"].indexOf(bestRank) !== -1 ? bestRank : "none";
      var rankLabel = bestRank || "-";
      var playerName = f.playerName || f.displayName || f.name || f.userId || "玩家";
      var pictureUrl = f.pictureUrl || "";

      var avatarHtml = pictureUrl
        ? '<img class="avatar show" src="' + escapeHtml(pictureUrl) + '" alt="">'
        : '<img class="avatar" alt="">';

      var item = document.createElement("div");
      item.className = "rank-item" + (f.isMe ? " me" : "");

      item.innerHTML =
        '<div class="rank-badge ' + getBadgeClass(f.position) + '">' + getBadgeIcon(f.position) + '</div>'
        + avatarHtml
        + '<div class="player-info">'
          + '<div class="player-name">'
            + escapeHtml(playerName)
            + (f.isMe ? '<span class="me-tag">我</span>' : '')
          + '</div>'
          + '<div class="player-score">最高分紀錄</div>'
        + '</div>'
        + '<span class="rank-tag ' + rankClass + '">' + escapeHtml(rankLabel) + '</span>'
        + '<div class="score-value">' + escapeHtml(f.bestScore || 0) + '</div>';

      listEl.appendChild(item);
    });
  }

  function renderRewardProgress(inviteCount, tierName) {
    inviteCount = Number(inviteCount || 0);

    document.getElementById("tier-name").textContent = tierName || "尚未解鎖";

    var pct = Math.min(inviteCount / 5 * 100, 100);
    document.getElementById("progress-fill").style.width = pct + "%";

    [
      { id: "node-1", need: 1 },
      { id: "node-3", need: 3 },
      { id: "node-5", need: 5 }
    ].forEach(function(item) {
      var el = document.getElementById(item.id);

      if (!el) return;

      if (inviteCount >= item.need) {
        el.classList.add("unlocked");
      } else {
        el.classList.remove("unlocked");
      }
    });
  }

  // ============================================================
  // 資料載入
  // ============================================================

  function loadInviteStatus() {
    return jsonp("inviteStatus", getProfileParams()).then(function(data) {
      data = data || {};

      var rewards = data.rewards || [];
      var unlockedTier = null;

      for (var i = rewards.length - 1; i >= 0; i--) {
        if (rewards[i].unlocked) {
          unlockedTier = rewards[i];
          break;
        }
      }

      renderRewardProgress(
        data.invitedCount || data.count || data.referralCount || data.lineInviteFriendCount || 0,
        unlockedTier ? unlockedTier.reward : "尚未解鎖"
      );

      return data;
    }).catch(function(err) {
      console.error("inviteStatus 載入失敗", err);
      renderRewardProgress(0, "尚未解鎖");
      return null;
    });
  }

  function loadLeaderboard() {
    return jsonp("friendRank", getProfileParams()).then(function(data) {
      renderLeaderboard(data || {});
      return data;
    }).catch(function(err) {
      console.error("friendRank 載入失敗", err);

      document.getElementById("rank-list").innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div>載入失敗，請稍後再試</div>';

      return null;
    });
  }

  // ============================================================
  // LIFF 初始化
  // ============================================================

  function initPage() {
    setLoadingText("正在連接 LINE...");

    if (typeof liff === "undefined") {
      document.getElementById("loading").innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div>LIFF SDK 載入失敗，請稍後再試</div>';
      return;
    }

    liff.init({
      liffId: LIFF_ID
    }).then(function() {
      if (!liff.isLoggedIn()) {
        setLoadingText("請登入 LINE 後查看排行榜...");

        liff.login({
          redirectUri: window.location.href
        });

        return null;
      }

      setLoadingText("正在讀取 LINE 個人資料...");
      return liff.getProfile();
    }).then(function(profile) {
      if (!profile) return;

      myUserId = profile.userId || "";
      myPlayerName = profile.displayName || "你";
      myPictureUrl = profile.pictureUrl || "";

      saveLocalProfile();

      if (!myUserId) {
        throw new Error("無法取得 LINE userId");
      }

      setLoadingText("正在載入排行榜...");

      return Promise.all([
        loadLeaderboard(),
        loadInviteStatus()
      ]);
    }).then(function() {
      if (!myUserId) return;

      document.getElementById("loading").style.display = "none";
      document.getElementById("main-content").style.display = "block";

      setDebug("我的邀請連結：" + buildInviteLink());
    }).catch(function(err) {
      console.error("LIFF init failed", err);

      document.getElementById("loading").innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div>初始化失敗<br>請確認是否在 LINE 中開啟此頁面</div>';
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initPage);
  } else {
    initPage();
  }
